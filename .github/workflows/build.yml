name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build single-file exe
        run: make build

      - name: Upload single-file exe
        uses: actions/upload-artifact@v4
        with:
          name: train-tools-exe
          path: dist/train-tools.exe

      - name: Build directory distribution
        run: make build-dir

      - name: Upload directory distribution
        uses: actions/upload-artifact@v4
        with:
          name: train-tools-dir
          path: dist/train-tools/
